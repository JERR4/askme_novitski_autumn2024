<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./../../static/css/style.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            <a href="index.html">
                AskPupkin
            </a>
        </div>
        <div class="search-form">
            <form action="#">
                <input class="search-form-input" placeholder="Search" type="text">
                <button class="search-form-button">ASK!</button>
            </form>
        </div>
        <div class="account">
            <div class="account-image">
                <img src="../../static/images/avatar.webp" alt="Image">
            </div>
            <div class="account-content">
                <div class="account-name">Dr. Pepper</div>
                <div class="account-actions">
                    <a href="./settings.html">settings</a>
                    <a href="./login.html">log out</a>
                </div>
            </div>
        </div>
    </header>

    <hr>

    <main class="container">
        <div class="content">

            <div class="main-content">
                <div class="title-bar">
                    <h1>New Question</h1>
                </div>

                <div class="error-message">
                    Sorry, not all fields are filled out
                </div>

                <article class="title-form">
                    <label>Title</label>
                    <div class="info-input">
                        <input class="form-control" placeholder="Enter title here..." maxlength="120">
                    </div>                    
                </article>
                
                <article class="text-form">
                    <label>Text</label>
                    <div class="info-input">
                        <textarea class="form-control" rows="20" placeholder="Enter your text here..."></textarea>
                    </div>
                </article>
                
                <article class="tags-form">
                    <label>Tags</label>
                    <div class="info-input">
                        <input class="form-control" placeholder="Enter tags here..."maxlength="120">
                    </div>
                </article>

                <div class="ask-button-area">
                    <button class="submit-button">ASK!</button>
                </div>        

            </div>

            <aside class="sidebar">
                <section class="popular-tags">
                    <h1>Popular Tags</h1>
                    <div class="tags">
                        <a href="#">perl</a>
                        <a href="#" style="color: #cd1714;">python</a>
                        <a href="#">TechnoPark</a>
                        <a href="#" style="color: #cd1714;">MySQL</a>
                        <a href="#" style="color: #54b250;">django</a>
                        <a href="#">Mail.Ru</a>
                        <a href="#">Voloshin</a>
                        <a href="#" style="color: #ff9f23;">Firefox</a>
                    </div>
                </section>
                <section class="best-members">
                    <h1>Best Members</h1>
                    <ul class="best-members-list">
                        <li><a href="#">Mr. Freeman</a></li>
                        <li><a href="#">Dr. House</a></li>
                        <li><a href="#">Bender</a></li>
                        <li><a href="#">Queen Victoria</a></li>
                        <li><a href="#">V. Pupkin</a></li>
                    </ul>
                </section>
            </aside>

        </div>
    </main>

</body>

</html>
